<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nethraflix — a birthday surprise for Nethra's 19th">
  <title>Nethraflix</title>
  <script>
    (function () {
      var base = document.createElement('base');
      var host = window.location.hostname;
      if (host === 'localhost' || host === '127.0.0.1' || window.location.protocol === 'file:') {
        base.href = './';
      } else {
        base.href = '/nethras-19th-birthday/';
      }
      document.head.appendChild(base);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- Who's watching? -->
  <section id="intro" class="screen screen--intro" aria-label="Choose profile">
    <div class="intro__ambient" aria-hidden="true"></div>
    <p class="intro__logo">NETHRAFLIX</p>
    <h1 class="intro__heading">Who's watching?</h1>
    <div class="intro__profiles" role="list">
      <button type="button" class="profile profile--active profile--animate" data-profile="nethra" aria-label="Nethra's profile">
        <span class="profile__ring" aria-hidden="true"></span>
        <span class="profile__avatar" id="profile-avatar-nethra"></span>
        <span class="profile__name">Nethra</span>
      </button>
      <div class="profile profile--locked profile--animate profile--animate-delay" role="listitem" aria-label="Aarav's profile, locked">
        <span class="profile__avatar profile__avatar--locked" id="profile-avatar-aarav"></span>
        <span class="profile__name">Aarav</span>
        <span class="profile__lock" aria-hidden="true">♥</span>
      </div>
    </div>
    <p class="intro__hint">Tap your profile to continue</p>
  </section>

  <!-- Home -->
  <section id="home" class="screen screen--home hidden" aria-label="Nethraflix home" hidden>
    <header class="nav">
      <div class="nav__inner">
        <a href="#" class="nav__logo" aria-label="Nethraflix home">NETHRAFLIX</a>
        <nav class="nav__links" aria-label="Main">
          <span class="nav__link nav__link--active" aria-current="page">Home</span>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__backdrop" id="hero-backdrop" role="img" aria-label="Featured memory"></div>
        <div class="hero__gradient"></div>
        <div class="hero__vignette" aria-hidden="true"></div>
        <div class="hero__content hero__content--animate">
          <p class="hero__eyebrow">Featured</p>
          <h1 id="hero-title" class="hero__title"></h1>
          <p id="hero-tagline" class="hero__tagline"></p>
          <p id="hero-meta" class="hero__meta"></p>
          <div class="hero__actions">
            <button type="button" class="btn btn--play" id="hero-play">
              <span class="btn__icon" aria-hidden="true">▶</span>
              Play
            </button>
            <button type="button" class="btn btn--info" id="hero-info">
              <span class="btn__icon" aria-hidden="true">ⓘ</span>
              More Info
            </button>
          </div>
        </div>
      </section>

      <div class="rows" id="rows" aria-label="Memory collections"></div>
    </main>
  </section>

  <!-- Detail modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel">
      <button type="button" class="modal__close" data-close aria-label="Close">
        <span aria-hidden="true">×</span>
      </button>
      <div class="modal__hero" id="modal-hero" role="img"></div>
      <div class="modal__body">
        <h2 id="modal-title" class="modal__title"></h2>
        <p id="modal-meta" class="modal__meta"></p>
        <p id="modal-caption" class="modal__caption"></p>
      </div>
    </div>
  </div>

  <!-- Letter modal -->
  <div id="letter-modal" class="modal modal--letter hidden" role="dialog" aria-modal="true" aria-labelledby="letter-title" hidden>
    <div class="modal__backdrop" data-close-letter></div>
    <div class="modal__panel modal__panel--letter">
      <button type="button" class="modal__close" data-close-letter aria-label="Close">
        <span aria-hidden="true">×</span>
      </button>
      <div class="letter">
        <p class="letter__eyebrow">Happy 19th Birthday</p>
        <h2 id="letter-title" class="letter__title"></h2>
        <div id="letter-body" class="letter__body"></div>
        <p class="letter__signoff">— Aarav ♥</p>
      </div>
    </div>
  </div>

  <div id="live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
  <div class="film-grain" aria-hidden="true"></div>

  <script src="js/catalog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
