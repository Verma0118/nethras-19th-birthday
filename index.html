<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nethraflix, a birthday surprise for Nethra's 19th">
  <meta name="theme-color" content="#0a0a0a">
  <title>Nethraflix</title>
  <script>
    (function () {
      var base = document.createElement('base');
      var host = window.location.hostname;
      if (host === 'localhost' || host === '127.0.0.1' || window.location.protocol === 'file:') {
        base.href = './';
      } else {
        base.href = '/nethras-19th-birthday/';
      }
      document.head.appendChild(base);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600;700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260628f">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- Boot loader -->
  <section id="loader" class="screen screen--loader" aria-label="Loading Nethraflix" aria-live="polite">
    <div class="loader__sky" aria-hidden="true">
      <span class="loader__heart" style="--i:0">♥</span>
      <span class="loader__heart" style="--i:1">♥</span>
      <span class="loader__heart" style="--i:2">♥</span>
      <span class="loader__heart" style="--i:3">♥</span>
      <span class="loader__heart" style="--i:4">♥</span>
      <span class="loader__spark" style="--i:0">✦</span>
      <span class="loader__spark" style="--i:1">✦</span>
      <span class="loader__spark" style="--i:2">✦</span>
    </div>
    <div class="loader__glow" aria-hidden="true"></div>

    <div class="loader__content">
      <div class="loader__peek" id="loader-peek" aria-hidden="true">
        <span class="loader__peek-ring"></span>
        <img class="loader__peek-img" id="loader-peek-img" src="" alt="">
      </div>

      <div class="loader__brand">
        <span class="loader__n">N</span>
        <div class="loader__wordmark">NETHRAFLIX</div>
      </div>

      <p class="loader__tagline">made with love, just for you</p>

      <div class="loader__bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Loading progress">
        <div class="loader__bar-shine" aria-hidden="true"></div>
        <div class="loader__bar-fill" id="loader-fill"></div>
      </div>

      <p class="loader__status" id="loader-status">
        <span id="loader-status-text">Loading your memories...</span>
      </p>

      <div class="loader__dots" aria-hidden="true">
        <span class="loader__dot-bounce"></span>
        <span class="loader__dot-bounce"></span>
        <span class="loader__dot-bounce"></span>
      </div>
    </div>
  </section>

  <!-- Who's watching? -->
  <section id="intro" class="screen screen--intro hidden" aria-label="Choose profile" hidden>
    <div class="intro__ambient" aria-hidden="true"></div>
    <p class="intro__logo">NETHRAFLIX</p>
    <h1 class="intro__heading">Who's watching?</h1>
    <div class="intro__profiles" role="list">
      <button type="button" class="profile profile--active profile--animate" data-profile="nethra" aria-label="Nethra's profile">
        <span class="profile__ring" aria-hidden="true"></span>
        <span class="profile__avatar" id="profile-avatar-nethra"></span>
        <span class="profile__name">Nethra</span>
      </button>
      <div class="profile profile--locked profile--animate profile--animate-delay" role="listitem" aria-label="Aarav's profile, locked">
        <span class="profile__avatar profile__avatar--locked" id="profile-avatar-aarav"></span>
        <span class="profile__name">Aarav</span>
        <span class="profile__lock" aria-hidden="true">♥</span>
      </div>
    </div>
    <p class="intro__hint" id="intro-hint">Tap your profile to continue</p>
  </section>

  <!-- Home -->
  <section id="home" class="screen screen--home hidden" aria-label="Nethraflix home" hidden>
    <header class="nav">
      <div class="nav__inner">
        <a href="#" class="nav__logo" aria-label="Nethraflix home">NETHRAFLIX</a>
        <nav class="nav__links" aria-label="Main">
          <span class="nav__link nav__link--active" aria-current="page">Home</span>
        </nav>
      </div>
    </header>

    <main id="main-content">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__backdrop" id="hero-backdrop" role="img" aria-label="Featured memory"></div>
        <div class="hero__gradient"></div>
        <div class="hero__vignette" aria-hidden="true"></div>
        <div class="hero__content hero__content--animate">
          <p class="hero__eyebrow">Now Streaming</p>
          <h1 id="hero-title" class="hero__title"></h1>
          <p id="hero-tagline" class="hero__tagline"></p>
          <p id="hero-meta" class="hero__meta"></p>
          <p id="hero-synopsis" class="hero__synopsis"></p>
          <div class="hero__actions">
            <button type="button" class="btn btn--play" id="hero-play">
              <span class="btn__icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true"><path d="M2 1.5v11l9-5.5z"/></svg>
              </span>
              Play
            </button>
            <button type="button" class="btn btn--info" id="hero-info">
              <span class="btn__icon" aria-hidden="true">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true"><path d="M7 1a6 6 0 100 12A6 6 0 007 1zm-.75 3h1.5v1.5h-1.5V4zm0 3h1.5v4h-1.5V7z"/></svg>
              </span>
              More Info
            </button>
          </div>
        </div>
      </section>

      <div class="catalog" id="catalog" aria-label="Memory collections"></div>
    </main>
  </section>

  <!-- Cinematic player -->
  <div id="player" class="player hidden" role="dialog" aria-modal="true" aria-labelledby="player-title" hidden>
    <div class="player__stage">
      <div class="player__layer player__layer--a" id="player-layer-a" role="img">
        <div class="player__layer-bg"></div>
      </div>
      <div class="player__layer player__layer--b" id="player-layer-b" role="img">
        <div class="player__layer-bg"></div>
      </div>
      <div class="player__vignette" aria-hidden="true"></div>
      <div class="player__gradient" aria-hidden="true"></div>
    </div>

    <div class="player__chrome" id="player-chrome">
      <header class="player__top">
        <button type="button" class="player__back" id="player-close" aria-label="Back to browse">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M12.5 15L7.5 10l5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Back</span>
        </button>
        <div class="player__show-meta">
          <h2 id="player-title" class="player__title"></h2>
          <p id="player-episode" class="player__episode"></p>
        </div>
      </header>

      <footer class="player__bottom">
        <div class="player__progress-wrap">
          <div class="player__progress" id="player-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div class="player__progress-fill" id="player-progress-fill"></div>
          </div>
          <div class="player__dots" id="player-dots" aria-label="Scene navigation"></div>
        </div>
        <div class="player__controls">
          <button type="button" class="player__ctrl" id="player-prev" aria-label="Previous scene">‹</button>
          <button type="button" class="player__ctrl player__ctrl--play" id="player-toggle" aria-label="Pause slideshow">
            <span class="player__pause-icon" aria-hidden="true">❚❚</span>
            <span class="player__play-icon hidden" aria-hidden="true">▶</span>
          </button>
          <button type="button" class="player__ctrl" id="player-next" aria-label="Next scene">›</button>
        </div>
      </footer>
    </div>

    <button type="button" class="player__tap player__tap--left" id="player-tap-left" aria-label="Previous scene" tabindex="-1"></button>
    <button type="button" class="player__tap player__tap--right" id="player-tap-right" aria-label="Next scene" tabindex="-1"></button>

    <div class="player__buffer" id="player-buffer" aria-hidden="true">
      <div class="player__spinner"></div>
    </div>

    <div class="player__preroll" id="player-preroll" hidden aria-live="polite">
      <div class="player__preroll-inner">
        <p class="player__preroll-eyebrow">Now Playing</p>
        <h2 class="player__preroll-title" id="player-preroll-title"></h2>
        <p class="player__preroll-text" id="player-preroll-text"></p>
        <div class="player__preroll-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Starting">
          <div class="player__preroll-fill" id="player-preroll-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Info panel -->
  <div id="info-panel" class="info-panel hidden" role="dialog" aria-modal="true" aria-labelledby="info-title" hidden>
    <div class="info-panel__backdrop" data-close-info></div>
    <div class="info-panel__sheet">
      <button type="button" class="info-panel__close" data-close-info aria-label="Close">
        <span aria-hidden="true">×</span>
      </button>
      <div class="info-panel__poster" id="info-poster" role="img"></div>
      <h2 id="info-title" class="info-panel__title"></h2>
      <p id="info-meta" class="info-panel__meta"></p>
      <p id="info-synopsis" class="info-panel__synopsis"></p>
      <button type="button" class="btn btn--play info-panel__play" id="info-play">
        <span class="btn__icon" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M2 1.5v11l9-5.5z"/></svg>
        </span>
        Play
      </button>
    </div>
  </div>

  <!-- Letter -->
  <div id="letter-modal" class="letter-modal hidden" role="dialog" aria-modal="true" aria-labelledby="letter-ink" hidden>
    <div class="letter-modal__backdrop" data-close-letter></div>

    <div class="letter-scene">
      <div class="letter-scene__glow" aria-hidden="true"></div>
      <div class="letter-scene__vignette" aria-hidden="true"></div>
      <div class="letter-scene__dust" aria-hidden="true"></div>
      <div class="letter-scene__desk" aria-hidden="true"></div>

      <div class="letter-envelope-stage" id="letter-envelope-stage">
        <p class="letter-scene__label">A letter for you</p>
        <button type="button" class="letter-envelope" id="letter-open-btn" aria-label="Open your letter">
          <span class="letter-envelope__shadow" aria-hidden="true"></span>
          <span class="letter-envelope__body" aria-hidden="true"></span>
          <span class="letter-envelope__liner" aria-hidden="true"></span>
          <span class="letter-envelope__slip" id="letter-slip" aria-hidden="true"></span>
          <span class="letter-envelope__flap" id="letter-flap" aria-hidden="true"></span>
          <span class="letter-envelope__string" id="letter-string" aria-hidden="true">
            <span class="letter-envelope__knot"></span>
          </span>
          <span class="letter-envelope__wax" id="letter-wax" aria-hidden="true">N</span>
          <span class="letter-envelope__name">For Chikki</span>
        </button>
        <p class="letter-envelope__hint" id="letter-hint">tap the envelope</p>
      </div>

      <div class="letter-messenger" id="letter-messenger" aria-hidden="true">
        <svg class="letter-messenger__goose" viewBox="0 0 80 72" width="96" height="86" aria-hidden="true">
          <ellipse cx="28" cy="48" rx="18" ry="12" fill="#f7f6f0"/>
          <ellipse class="letter-messenger__wing" cx="22" cy="44" rx="8" ry="5" fill="#ebe9df" transform="rotate(-12 22 44)"/>
          <path d="M30 38 C32 28 38 22 44 24" stroke="#f7f6f0" stroke-width="8" fill="none" stroke-linecap="round"/>
          <g class="letter-messenger__head">
            <circle cx="48" cy="22" r="8" fill="#f7f6f0"/>
            <circle cx="50" cy="21" r="1.5" fill="#2a2a2a"/>
            <g class="letter-messenger__beak">
              <path class="letter-messenger__beak-upper" d="M54 19 L64 17 L54 24 Z" fill="#f0a030"/>
              <path class="letter-messenger__beak-lower" d="M54 24 L64 23 L54 28 Z" fill="#e09020"/>
            </g>
          </g>
          <g class="letter-messenger__feet">
            <path d="M18 58 L12 66 M22 58 L16 66" stroke="#f0a030" stroke-width="2.8" stroke-linecap="round"/>
            <path d="M30 58 L36 66 M34 58 L40 66" stroke="#f0a030" stroke-width="2.8" stroke-linecap="round"/>
          </g>
        </svg>
      </div>

      <article class="letter-paper hidden" id="letter-paper" aria-labelledby="letter-ink">
        <button type="button" class="letter-paper__close" data-close-letter aria-label="Close letter">
          <span aria-hidden="true">×</span>
        </button>
        <div class="letter-paper__sheet">
          <p class="letter-paper__date" id="letter-date" aria-hidden="true"></p>
          <p class="letter-paper__ink" id="letter-ink" aria-live="polite"></p>
          <p class="letter-paper__signoff hidden" id="letter-signoff">Aarav ♥</p>
        </div>
      </article>
    </div>
  </div>

  <div id="goose-field" class="goose-field hidden" hidden aria-hidden="true"></div>

  <div id="live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
  <div class="ambient-bg" aria-hidden="true"></div>
  <div class="film-grain" aria-hidden="true"></div>

  <script src="js/catalog.js?v=20260628f"></script>
  <script src="js/gooses.js?v=20260628f"></script>
  <script src="js/app.js?v=20260628f"></script>
</body>
</html>
